<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter for a flower</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <img src="doggie.jpg" class="deco deco1">
    <img src="keroppi.jpg" class="deco deco2">
    <img src="akechi.jpg" class="deco deco3">
    <img src="sylveon.jpg" class="deco deco4">

    <div class="envelope" id="envelope">

        <div class="flap"></div>

        <div class="letter">

            <div class="panel top-panel">
                <h2>Eve</h2>
            </div>

            <div class="panel middle-panel">
                <p>
                In the middle of a flower field,<br>
                One shines brightly among the others.<br><br>

                She is beautiful like a rose,<br>
                She is brave like an iris,<br>
                She is strong like a gladiolus,<br>
                She is sweet like a cornflower.<br><br>

                Every flower around is looking at her,<br>
                Her name is Eve.
                </p>
            </div>

            <div class="panel bottom-panel">
                <img src="champsfleurs.jpg" alt="champsfleurs">
            </div>

        </div>

        <div class="seal" id="seal">
            <img src="fleur.png" alt="fleur">
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
